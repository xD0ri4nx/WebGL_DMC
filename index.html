<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebGL Project - Martian Edition (P1, P2, P3, C1, C2)</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

  // 1. SCENE SETUP & HORIZON (P1)
  const scene = new THREE.Scene();

  const textureLoader = new THREE.TextureLoader();
  const skyTexture = textureLoader.load('textures/marsrocks.jpg');
  skyTexture.mapping = THREE.EquirectangularReflectionMapping;
  skyTexture.colorSpace = THREE.SRGBColorSpace;
  scene.background = skyTexture;

  // 2. CAMERA & RENDERER SETUP
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 80, 100);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // 3. CAMERA CONTROLS (P3)
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.maxPolarAngle = Math.PI / 2 - 0.05;

  // 4. TERRAIN & RELIEF (P1 - Martian Tint)
  const planeGeometry = new THREE.PlaneGeometry(250, 250, 256, 256);
  const positions = planeGeometry.attributes.position.array;

  for (let i = 0; i < positions.length; i += 3) {
    const x = positions[i];
    const y = positions[i + 1];

    let height = Math.sin(x / 10) * Math.cos(y / 10) * 5;
    let d = Math.sqrt((x / 1.5) * (x / 1.5) + (y * y));
    const trackHeight = 0.5;

    if (d >= 25 && d <= 45) {
      if (d >= 30 && d <= 40) {
        height = trackHeight;
      } else if (d > 25 && d < 30) {
        let blend = (d - 25) / 5;
        height = height * (1 - blend) + trackHeight * blend;
      } else if (d > 40 && d < 45) {
        let blend = (45 - d) / 5;
        height = height * (1 - blend) + trackHeight * blend;
      }
    }
    positions[i + 2] = height;
  }

  planeGeometry.computeVertexNormals();

  const rockColor = textureLoader.load('textures/rock.jpg');
  rockColor.wrapS = rockColor.wrapT = THREE.RepeatWrapping;
  rockColor.repeat.set(25, 25);

  const planeMaterial = new THREE.MeshStandardMaterial({
    map: rockColor,
    roughness: 0.9,
    color: 0xcc6644
  });

  const plane = new THREE.Mesh(planeGeometry, planeMaterial);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true;
  scene.add(plane);

  // 5. GLOBAL LIGHTING SETUP (Warm / Dusty)
  const ambientLight = new THREE.AmbientLight(0xffccaa, 0.5);
  scene.add(ambientLight);

  const moonLight = new THREE.DirectionalLight(0xffaa88, 0.4);
  moonLight.position.set(50, 50, 20);
  moonLight.castShadow = true;
  scene.add(moonLight);

  // 6. TRACK GEOMETRY & TEXTURE (P2)
  const trackGeometry = new THREE.RingGeometry(30, 40, 64);

  const asphaltColor = textureLoader.load('textures/rock.jpg');
  asphaltColor.wrapS = asphaltColor.wrapT = THREE.RepeatWrapping;
  asphaltColor.repeat.set(40, 40);

  const trackMaterial = new THREE.MeshStandardMaterial({
    map: asphaltColor,
    roughness: 1.0,
    side: THREE.DoubleSide
  });

  const track = new THREE.Mesh(trackGeometry, trackMaterial);
  track.rotation.x = -Math.PI / 2;
  track.position.y = 0.51;
  track.scale.set(1.5, 1, 1);
  track.receiveShadow = true;
  scene.add(track);

  // 7. MARTIAN ROCK FORMATIONS (P2 & C1)
  const rockHitboxes = [];
  const baseRockGeo = new THREE.DodecahedronGeometry(1, 0);

  for (let i = 0; i < 25; i++) {
    let angle = Math.random() * Math.PI * 2;
    let radius = Math.random() > 0.4 ? 50 + Math.random() * 40 : 5 + Math.random() * 15;

    let x = Math.cos(angle) * radius * 1.5;
    let z = Math.sin(angle) * radius;

    let height = Math.sin(x / 10) * Math.cos(z / 10) * 5;
    let d = Math.sqrt((x / 1.5) * (x / 1.5) + (z * z));
    const trackHeight = 0.5;
    if (d >= 25 && d <= 45) {
      if (d >= 30 && d <= 40) height = trackHeight;
      else if (d > 25 && d < 30) height = height * (1 - ((d - 25) / 5)) + trackHeight * ((d - 25) / 5);
      else if (d > 40 && d < 45) height = height * (1 - ((45 - d) / 5)) + trackHeight * ((45 - d) / 5);
    }

    const r = 0.4 + Math.random() * 0.3;
    const g = 0.1 + Math.random() * 0.1;
    const b = Math.random() * 0.1;

    const rockMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(r, g, b),
      roughness: 0.9,
      metalness: 0.1
    });

    let rock = new THREE.Mesh(baseRockGeo, rockMat);

    const baseScale = 2.0 + Math.random() * 3.0;
    const scaleX = baseScale * (0.8 + Math.random() * 0.4);
    const scaleY = baseScale * (1.5 + Math.random() * 1.5);
    const scaleZ = baseScale * (0.8 + Math.random() * 0.4);
    rock.scale.set(scaleX, scaleY, scaleZ);

    rock.rotation.y = Math.random() * Math.PI;
    rock.rotation.z = (Math.random() - 0.5) * 0.2;

    rock.position.set(x, height + scaleY, z);
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);

    rock.updateMatrixWorld();
    const hitbox = new THREE.Box3().setFromObject(rock);
    rockHitboxes.push(hitbox);
  }

  // 8. LED STRIP LIGHT POLES (P3)
  const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });

  const ledGeo = new THREE.BoxGeometry(0.1, 7.5, 0.1);
  const ledMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xffaa00, // Neon sci-fi orange glow
    emissiveIntensity: 3
  });

  const numLights = 8;
  for (let i = 0; i < numLights; i++) {
    let angle = (i / numLights) * Math.PI * 2;
    let radius = 42;
    let x = Math.cos(angle) * radius * 1.5;
    let z = Math.sin(angle) * radius;

    let height = Math.sin(x / 10) * Math.cos(z / 10) * 5;
    let d = Math.sqrt((x / 1.5) * (x / 1.5) + (z * z));
    const trackHeight = 0.5;
    if (d >= 25 && d <= 45) {
      if (d >= 30 && d <= 40) height = trackHeight;
      else if (d > 25 && d < 30) height = height * (1 - ((d - 25) / 5)) + trackHeight * ((d - 25) / 5);
      else if (d > 40 && d < 45) height = height * (1 - ((45 - d) / 5)) + trackHeight * ((45 - d) / 5);
    }

    let poleGroup = new THREE.Group();
    poleGroup.position.set(x, height + 4, z);

    let poleBase = new THREE.Mesh(poleGeo, poleMat);
    poleBase.castShadow = true;
    poleGroup.add(poleBase);

    let ledStrip = new THREE.Mesh(ledGeo, ledMat);
    ledStrip.position.set(0, 0, 0.2);
    poleGroup.add(ledStrip);

    poleGroup.lookAt(0, height + 4, 0);
    scene.add(poleGroup);

    let spotLight = new THREE.SpotLight(0xffddaa, 2);
    spotLight.position.set(x, height + 8, z);
    spotLight.castShadow = true;
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.5;
    spotLight.distance = 60;
    spotLight.shadow.mapSize.width = 1024;
    spotLight.shadow.mapSize.height = 1024;

    let target = new THREE.Object3D();
    target.position.set(Math.cos(angle) * 35 * 1.5, height, Math.sin(angle) * 35);
    scene.add(target);
    spotLight.target = target;
    scene.add(spotLight);
  }

  // 9. DRONES (C2) - Invisible Hitboxes
  const drones = [];
  const droneGeo = new THREE.SphereGeometry(0.5, 8, 8);
  const invisibleDroneMat = new THREE.MeshStandardMaterial({ visible: false }); // Makes the sphere invisible

  for(let i = 0; i < 5; i++) {
    let drone = new THREE.Mesh(droneGeo, invisibleDroneMat);
    drone.position.set(Math.random() * 20 - 10, 5, Math.random() * 20 - 10);

    drone.userData.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      0,
      (Math.random() - 0.5) * 0.3
    );
    scene.add(drone);
    drones.push(drone);
  }

  // 10. CAR MODELS & HITBOXES (C1, C2)
  const gltfLoader = new THREE.GLTFLoader();

  // --- 1. Invisible Hitbox for the Predefined Path Car ---
  const carGeo = new THREE.BoxGeometry(2, 1, 4);
  const invisibleMat = new THREE.MeshStandardMaterial({ visible: false }); // Makes the box invisible

  const redCar = new THREE.Mesh(carGeo, invisibleMat);
  scene.add(redCar);
  let redCarAngle = 0;

  // --- 2. Invisible Hitbox for the Player Car ---
  const playerCar = new THREE.Mesh(carGeo, invisibleMat);
  playerCar.position.set(0, 1.01, 35);
  scene.add(playerCar);

  const keys = { w: false, a: false, s: false, d: false };
  document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
  document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
  const playerHitbox = new THREE.Box3();

  // --- 3. Load the Rover Model ONCE and clone it ---
  gltfLoader.load('models/25042_Perseverance.glb', (gltf) => {
    const playerModel = gltf.scene;

    // Turn ON shadows for the imported rover model
    playerModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    playerModel.scale.set(1, 1, 1);
    playerModel.position.y = -0.5; // Drops the model so the wheels touch the ground

    const aiModel = playerModel.clone();

    // Attach the 3D models to your invisible hitboxes!
    playerCar.add(playerModel);
    redCar.add(aiModel);
  });

  // --- 4. Load the Drone Model ---
  gltfLoader.load('models/drone.glb', (gltf) => {
    const droneModel = gltf.scene;

    // Turn OFF shadows for the drone to optimize performance
    droneModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = false;
        child.receiveShadow = true;
      }
    });

    // Scale set exactly to 0.01 as requested
    droneModel.scale.set(0.01, 0.01, 0.01);
    droneModel.position.y = -0.5;

    // Loop through all 5 invisible drone hitboxes and attach a clone
    for (let invisibleDrone of drones) {
      invisibleDrone.add(droneModel.clone());
    }
  });

  // 11. MASTER ANIMATION LOOP
  function animate() {
    requestAnimationFrame(animate);

    // --- Predefined Path (AI Car) ---
    redCarAngle += 0.015;
    const trackRadius = 35;
    const currentX = Math.cos(redCarAngle) * trackRadius * 1.5;
    const currentZ = Math.sin(redCarAngle) * trackRadius;
    redCar.position.set(currentX, 1.01, currentZ);

    const nextX = Math.cos(redCarAngle + 0.1) * trackRadius * 1.5;
    const nextZ = Math.sin(redCarAngle + 0.1) * trackRadius;
    redCar.lookAt(nextX, 1.01, nextZ);

    // --- Hovering & Gliding (Green Drones) ---
    for (let drone of drones) {
      drone.position.x += drone.userData.velocity.x;
      drone.position.z += drone.userData.velocity.z;

      // Make the 3D model face the direction it is flying
      const lookX = drone.position.x + drone.userData.velocity.x;
      const lookZ = drone.position.z + drone.userData.velocity.z;
      drone.lookAt(lookX, drone.position.y, lookZ);

      if(drone.position.x < -40 || drone.position.x > 40) drone.userData.velocity.x *= -1;
      if(drone.position.z < -40 || drone.position.z > 40) drone.userData.velocity.z *= -1;

      let dx = drone.position.x;
      let dz = drone.position.z;
      let dHeight = Math.sin(dx / 10) * Math.cos(dz / 10) * 5;
      let dDist = Math.sqrt((dx / 1.5) * (dx / 1.5) + (dz * dz));

      if (dDist >= 25 && dDist <= 45) {
        if (dDist >= 30 && dDist <= 40) dHeight = 0.5;
        else if (dDist > 25 && dDist < 30) dHeight = dHeight * (1 - ((dDist - 25) / 5)) + 0.5 * ((dDist - 25) / 5);
        else if (dDist > 40 && dDist < 45) dHeight = dHeight * (1 - ((45 - dDist) / 5)) + 0.5 * ((45 - dDist) / 5);
      }

      let targetY = dHeight + 2.0;

      for (let rockBox of rockHitboxes) {
        if (dx >= rockBox.min.x && dx <= rockBox.max.x &&
          dz >= rockBox.min.z && dz <= rockBox.max.z) {
          targetY = Math.max(targetY, rockBox.max.y + 1.5);
        }
      }
      drone.position.y += (targetY - drone.position.y) * 0.1;
    }

    // --- Player Movement & Off-Roading ---
    const oldPosition = playerCar.position.clone();

    if (keys['w']) playerCar.translateZ(-0.5);
    if (keys['s']) playerCar.translateZ(0.5);
    if (keys['a']) playerCar.rotation.y += 0.06;
    if (keys['d']) playerCar.rotation.y -= 0.06;

    let px = playerCar.position.x;
    let pz = playerCar.position.z;

    let pHeight = Math.sin(px / 10) * Math.cos(pz / 10) * 5;
    let pd = Math.sqrt((px / 1.5) * (px / 1.5) + (pz * pz));

    if (pd >= 25 && pd <= 45) {
      if (pd >= 30 && pd <= 40) pHeight = 0.5;
      else if (pd > 25 && pd < 30) pHeight = pHeight * (1 - ((pd - 25) / 5)) + 0.5 * ((pd - 25) / 5);
      else if (pd > 40 && pd < 45) pHeight = pHeight * (1 - ((45 - pd) / 5)) + 0.5 * ((45 - pd) / 5);
    }

    playerCar.position.y = pHeight + 0.5;

    // --- Player Rock Collisions ---
    playerCar.updateMatrixWorld();
    playerHitbox.setFromObject(playerCar);

    for (let rockBox of rockHitboxes) {
      if (playerHitbox.intersectsBox(rockBox)) {
        playerCar.position.copy(oldPosition);
        break;
      }
    }

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>
</body>
</html>
